services:
  mebtty:
    build: .
    container_name: mebtty
    ports:
      - "${MEBTTY_HOST:-0.0.0.0}:${MEBTTY_PORT:-18888}:18888"
    volumes:
      - mebtty-data:/app/data
      - mebtty-uploads:/app/uploads
    environment:
      - MEBTTY_SECRET_KEY=${MEBTTY_SECRET_KEY:?Set MEBTTY_SECRET_KEY to a persistent random value before starting Docker Compose}
      - MEBTTY_DATABASE_URL=sqlite+aiosqlite:////app/data/mebtty.db
    restart: unless-stopped

volumes:
  mebtty-data:
  mebtty-uploads:
